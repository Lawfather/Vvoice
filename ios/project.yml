name: VelvetVoice
options:
  bundleIdPrefix: com.lawfather
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
targets:
  VelvetVoice:
    type: application
    platform: iOS
    sources:
      - path: VelvetVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lawfather.velvetvoice
        INFOPLIST_FILE: VelvetVoice/Info.plist
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: U2J4PKZBCV
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
